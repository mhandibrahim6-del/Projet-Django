<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Temperature Monitoring</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f2f2f2; }

        .header {
            background: #333;
            color: white;
            padding: 15px 20px;
            font-size: 20px;
        }

        .card-blue {
            background: #2196F3;
            color: white;
            padding: 30px 40px;
            margin: 20px;
            border-radius: 8px;
        }
        .card-blue .temp { font-size: 40px; font-weight: bold; }
        .card-blue .time { margin-top: 10px; font-size: 14px; }

        .section {
            background: white;
            margin: 20px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        .section h3 { margin-bottom: 15px; color: #333; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f5f5f5; padding: 10px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover { background: #fafafa; }
    </style>
</head>
<body>

<div class="header">Temperature monitoring</div>

{% if mesure %}
<div class="card-blue">
    <div class="temp">{{ mesure.temperature }} C°</div>
    <div class="time">{{ mesure.date }}</div>
</div>
{% else %}
<div class="card-blue">
    <div class="temp">-- C°</div>
    <div class="time">Aucune donnée disponible</div>
</div>
{% endif %}

<div class="section">
    <h3>Graphe Temperature</h3>
    <canvas id="myChart" height="80"></canvas>
</div>

<div class="section">
    <h3>les enregistrements</h3>
    <table>
        <thead>
            <tr>
                <th>Température</th>
                <th>Humidité</th>
                <th>Date:Heure</th>
            </tr>
        </thead>
        <tbody>
            {% for m in mesures %}
            <tr>
                <td>{{ m.temperature }}</td>
                <td>{{ m.humidite }}</td>
                <td>{{ m.date }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    const labels = [{% for m in mesures %}"{{ m.date|date:'d/m H:i' }}",{% endfor %}];
    const data = [{% for m in mesures %}{{ m.temperature }},{% endfor %}];

    new Chart(document.getElementById('myChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Température (°C)',
                data: data,
                borderColor: '#2196F3',
                backgroundColor: 'rgba(33,150,243,0.1)',
                fill: true,
                tension: 0.3,
                pointRadius: 4,
            }]
        },
        options: {
            responsive: true,
            plugins: { legend: { display: true } },
            scales: { y: { beginAtZero: false } }
        }
    });
</script>

</body>
</html>

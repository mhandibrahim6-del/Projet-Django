<!DOCTYPE html>
<html>
<head>
    <title>Station IoT</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f2f2;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            width: 200px;
            box-shadow: 0 0 10px gray;
        }

        .value {
            font-size: 30px;
            color: blue;
        }
    </style>
</head>

<body>

<h1>Monitoring IoT</h1>

{% if mesure %}

<div class="card">
    <h2>Température</h2>
    <div class="value">{{ mesure.temperature }} °C</div>
</div>

<div class="card">
    <h2>Humidité</h2>
    <div class="value">{{ mesure.humidite }} %</div>
</div>

<p>Dernière mesure : {{ mesure.date }}</p>

{% else %}
<p>Aucune donnée disponible</p>
{% endif %}

</body>
</html>
